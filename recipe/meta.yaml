{% set name = "hydromt" %}
{% set version = "1.3.1" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hydromt-{{ version }}.tar.gz
  sha256: 82d185ad1dc4f9819e0591f71819dde4b5ab10c11c1632bf0eb5d1d675b0872e

build:
  number: 0
  noarch: python
  entry_points:
    - hydromt = hydromt.cli.main:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - flit
    - python {{ python_min }}
  run:
    # since noarch: python doesn't allow us to do fsspec[http]
    # we have to manually list the extra dependencies the http
    # features of fsspec pulls in. 
    - affine
    - aiohttp !=4.0.0a0,!=4.0.0a1
    - bottleneck
    - click
    - dask
    - fsspec
    - geopandas >=0.10
    - importlib-metadata
    - mercantile
    - netcdf4
    - numba
    - numpy
    - packaging
    - pandas
    - pooch
    - pyarrow
    - pydantic ~=2.4
    - pydantic-settings ~=2.2
    - pyflwdir >=0.5.4
    - pyogrio >=0.6
    - pyproj
    - pystac
    - python >={{ python_min }}
    - pyyaml
    - rasterio
    - requests
    - rioxarray
    - scipy
    - shapely >=2.1.0
    - tomli
    - tomli-w
    - universal_pathlib >=0.2
    - xarray
    - xmltodict
    - xugrid >=0.9.0
    - zarr >=3.1,<4
test:
  imports:
    - hydromt
    - hydromt.cli
  commands:
    - pip check
    - hydromt --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/hydromt/
  summary: 'HydroMT: Build and analyze models like a data-wizard!'
  doc_url: https://deltares.github.io/hydromt/stable/
  dev_url: https://github.com/Deltares/hydromt
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dalmijn
    - FMSST
    - savente93
    - DirkEilander
    - hboisgon
    - LuukBlom
